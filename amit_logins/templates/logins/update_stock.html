{% extends 'logins/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0" style="max-width: 600px; margin: auto; border-radius: 15px;">
        <div class="card-header text-white text-center" style="background: linear-gradient(135deg, #1e3a8a, #3b82f6); border-top-left-radius: 15px; border-top-right-radius: 15px;">
            <h3 class="mb-0 text-uppercase" style="font-weight: 900;">{{ title }} - {{ branch }}</h3>
        </div>
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-bold">Select Component</label>
                    {{ form.COMPONENT }}
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Quantity to {% if action == 'take' %}Take{% else %}Add{% endif %}</label>
                    {{ form.QUANTITY }}
                    {% if action == 'take' %}
                    <div id="availability-badge" class="mt-2" style="display: none;">
                        <span class="badge bg-warning text-dark" id="availability-text" style="font-size: 0.9rem;"></span>
                    </div>
                    {% endif %}
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" id="submit-btn" class="btn btn-lg text-white" style="background: {% if action == 'take' %}#ff9800{% else %}#00bcd4{% endif %}; font-weight: bold;">
                        UPDATE STOCK
                    </button>
                    <a href="{% url 'component_list' branch %}" class="btn btn-outline-secondary">CANCEL</a>
                </div>
            </form>
        </div>
    </div>
    {% if messages %}
    <div class="mt-3" style="max-width: 600px; margin: auto;">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const stockMapping = {{ stock_mapping_json|safe }};
        const action = "{{ action }}";
        const componentSelect = document.querySelector('select[name="COMPONENT"]');
        const quantityInput = document.querySelector('input[name="QUANTITY"]');
        const badge = document.getElementById('availability-badge');
        const badgeText = document.getElementById('availability-text');
        const submitBtn = document.getElementById('submit-btn');

        function updateLimits() {
            const selectedCode = componentSelect.value;
            const available = stockMapping[selectedCode] || 0;

            if (action === 'take') {
                quantityInput.setAttribute('max', available);
                badge.style.display = 'block';
                badgeText.textContent = `Available in {{ branch }}: ${available}`;
                
                const val = parseInt(quantityInput.value);
                if (val > available) {
                    quantityInput.style.borderColor = 'red';
                    quantityInput.style.backgroundColor = '#fff5f5';
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'INSUFFICIENT STOCK';
                } else {
                    quantityInput.style.borderColor = '';
                    quantityInput.style.backgroundColor = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'UPDATE STOCK';
                }
            }
        }

        if (componentSelect) {
            componentSelect.addEventListener('change', updateLimits);
        }
        if (quantityInput) {
            quantityInput.addEventListener('input', updateLimits);
        }
        
        // Initial call
        updateLimits();
    });
</script>

<style>
    .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
    }
    .card {
        transition: transform 0.3s ease;
    }
    .card:hover {
        transform: translateY(-5px);
    }
    .badge {
        padding: 8px 12px;
        border-radius: 8px;
    }
</style>
{% endblock %}
